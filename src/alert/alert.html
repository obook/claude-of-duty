<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Claude of Duty</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="128x128" href="../icons/icon-128.png">
    <link rel="stylesheet" href="alert.css">
  </head>
  <body>
    <header class="header">
      <img class="logo" src="../icons/icon.svg" alt="" width="24" height="24">
      <h1 class="title" id="title" data-i18n="alertTitle">Usage alert</h1>
    </header>

    <ul class="meters" id="meters"></ul>

    <footer class="footer">
      <span class="countdown" id="countdown"></span>
      <div class="footer-buttons">
        <button type="button" id="keep-open" data-i18n="alertKeepOpen">Keep open</button>
        <button type="button" id="snooze" data-i18n="alertSnooze">Snooze 1 h</button>
        <button type="button" id="close" data-i18n="alertClose">Close</button>
      </div>
    </footer>

    <script src="alert.js"></script>
  </body>
</html>
