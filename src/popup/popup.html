<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Claude of Duty</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header class="header">
      <img class="logo" src="../icons/icon.svg" alt="" width="28" height="28">
      <h1 class="title">Claude of Duty</h1>
    </header>

    <ul class="meters" id="meters">
      <li class="empty" id="empty" data-i18n="popupEmpty">No reading yet. Open Claude, then refresh.</li>
    </ul>

    <div class="chart" id="chart-box" hidden>
      <div id="history-chart"></div>
      <div class="chart-legend" id="chart-legend"></div>
    </div>

    <div class="status warning" id="api-warning" hidden data-i18n="popupApiWarning">The Claude API response looks different; readings may be incomplete.</div>

    <div class="status" id="snooze-status" hidden>
      <span id="snooze-text"></span>
      <button type="button" id="snooze-cancel" data-i18n="popupSnoozeCancel">Resume</button>
    </div>

    <div class="actions">
      <button type="button" id="refresh" data-i18n="popupRefresh">Refresh now</button>
      <button type="button" id="test" data-i18n="popupTest">Test alert</button>
      <button type="button" id="options" data-i18n="popupOptions">Settings</button>
    </div>

    <p class="freshness" id="freshness"></p>

    <script src="chart.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
