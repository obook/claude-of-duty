name: Lint

# Runs the official add-on linter (the same one AMO uses) on every push and
# pull request, so manifest or packaging problems show up before a release.

on:
  push:
  pull_request:

jobs:
  web-ext-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: web-ext lint
        run: npx --yes web-ext lint --source-dir src
