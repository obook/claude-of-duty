name: Checks

# Runs the official add-on linter (the same one AMO uses) and the unit tests on
# every push and pull request, so problems show up before a release.

on:
  push:
  pull_request:

jobs:
  web-ext-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: web-ext lint
        run: npx --yes web-ext lint --source-dir src

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run unit tests
        run: bash tests/run-all.sh
